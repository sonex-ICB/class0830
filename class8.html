<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
      /* RWD  */
      .demo {
         background: orange;
         color: #fff;
         padding: 20px;
      }
      .demo2{
         font-size: 12px;
         display: none;
      }
      .container{
         display: flex;
         flex-direction: column;
         width: 90%;
         max-width: 800px;
         margin: 30px auto;
         gap: 10px;
      }
      .container .item{
         background: orangered;
         padding: 10px;
         width: 100%;
      }

      @media screen and (min-width: 768px) and (max-width: 1024px)  {
         .demo {
            background: rgb(30, 25, 18);
         }
         .demo2{
            font-size: 15px;
            display: block;
         }
      }
      @media screen and (min-width: 1025px) {
         .demo{
            background: purple;
         }
         .container{
            flex-direction: row;
         }
      }





   </style>
</head>

<body>
   <div class="demo">Lorem, ipsum dolor.</div>
   <div class="demo2"> Lorem ipsum dolor sit amet consectetur.</div>

   <div class="container">
      <div class="item"> Lorem ipsum dolor sit.</div>
      <div class="item"> Lorem ipsum dolor sit.</div>
      <div class="item"> Lorem ipsum dolor sit.</div>
   </div>
</body>

</html>
