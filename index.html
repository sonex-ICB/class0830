<html lang="en">

<head>
    <meta charset="UTF-8">

        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="alert_holder">
        <!-- <div class="alert alert-primary mx-3 my-3">
            <div class="date fw-semibold">12/1/2026</div>
            <div class="title my-2 fw-bolder">Order ready</div>
            <p class="description">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Saepe, itaque. Eligendi,
                mollitia.
            </p>
        </div> -->
    </div>

</body>
<script>
    const notifications = [
        {
            id: 1,
            text: "Order Ready",
            date: "10 / 2 / 2026",
            description: "Lorem ipsum dolor, sit amet consectetur adipisicing elit. Itaque, repellendus?",
            is_read: true
        },
        {
            id: 2,
            text: "Reminder",
            date: "20 / 1 / 2026",
            description:"Lorem ipsum dolor sit amet consectetur, adipisicing elit.",
            is_read: false
        },
        {
            id: 3,
            text: "App Installed",
            date: "13 / 2 / 2026",
            description:"Lorem ipsum dolor sit amet.",
            is_read: true
        },
        {
            id: 4,
            text: "Missed Call",
            date: "1 / 3 / 2026",
            description: "Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum maiores nobis a numquam possimus placeat modi non distinctio dolor cum.",
            is_read: false
        },
    ]

    let alert = ""
    notifications.forEach(p => {
        const alertClass = p.is_read ? 'alert-success' : 'alert-danger';
        alert +=
            `<div class="alert ${alertClass} mx-3 my-3">
            <div class="date fw-semibold">${p.date}</div>
            <div class="title my-2 fw-bolder">${p.text}</div>
            <p class="description">${p.description}</p>
        </div>
        `;
    });
    document.querySelector('.alert_holder').innerHTML = alert;


</script>

</html>
