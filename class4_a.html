    //array method// are used to create, manipulate, transform and search arrays

    //Mutating Methods (Modify the Original Array)

    //add and remove
    let myarray = ['Purple']
    myarray = []
    myarray.push('red','blue')//adds to the end
    document.writeln(myarray)
    document.writeln("<br>")
    // pop()//removes from the end
    myarray.pop()
    // document.writeln(myarray.pop())
    document.writeln("<br>")
    document.writeln(myarray)
    myarray.push('Yellow','Cyan','Ray','Almon','Pink')
    myarray.shift()//removes from the front
    document.writeln("<br>")
    document.writeln(myarray)
    myarray.unshift('Black')//adds to the front
    document.writeln("<br>")
    document.writeln(myarray)
    
    myarray = ['a','b','c','d','e']
    myarray.splice(3,2,"A",)// adds and removes elements at specific points
    document.writeln("<br>")
    document.writeln(myarray)
    
    //order/fill
    // sort()//arranges elements
    array_6=[3,1,2]; 
    array_6.sort(); // array_6⇒[1,2,3]
    document.writeln("<br>")
    document.writeln(array_6)
    array_6=[3,1,2]; 
    document.writeln("<br>")
    document.writeln(array_6.sort().reverse())
    document.writeln(('welcome').toUpperCase().indexOf('E'))
    // reverse()//flips the order of the array
    array_6.reverse(); // array_6⇒[3,2,1]
    // fill()//replaces elements with static values
    array_6 = ['red',,,,,,,,,,,,,,,,,,,]
    array_6.fill(true); // array_6⇒[0,0,0]
    document.writeln("<br>")
    document.writeln(array_6)

   array.forEach(a => {

    (1.2345).toPrecision(3); // "1.23"

    Math.round(1.5); // 2

    Math.abs(-5); // 5

    Math.sin(Math.PI / 2); // 1

    Object.keys()//returns property names

    Object.values()//returns property values
